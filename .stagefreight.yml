version: 1

vars:
  org: prplanit
  repo: fairer-pages

sources:
  primary:
    kind: git
    worktree: "."
    url: "https://github.com/{var:org}/{var:repo}"
    default_branch: "main"

policies:
  git_tags:
    stable: "^v?\\d+\\.\\d+\\.\\d+$"
    prerelease: "^v?\\d+\\.\\d+\\.\\d+-.+"
  branches:
    main: "^main$"

builds:
  - id: fairer-pages
    kind: docker
    platforms: [linux/amd64]

targets:
  # ── Docker Hub: stable releases ─────────────────────────────────
  - id: dockerhub-stable
    kind: registry
    build: fairer-pages
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "{version}"
      - "latest"
    when: { git_tags: [stable], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: pre-releases ────────────────────────────────────
  - id: dockerhub-prerelease
    kind: registry
    build: fairer-pages
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "{version}"
    when: { git_tags: [prerelease], events: [tag] }
    credentials: DOCKER

  # ── Docker Hub: dev builds on every commit ──────────────────────
  - id: dockerhub-dev
    kind: registry
    build: fairer-pages
    url: docker.io
    provider: docker
    path: "{var:org}/{var:repo}"
    tags:
      - "dev-{sha:8}"
      - "latest-dev"
    when: { branches: [main], events: [push] }
    credentials: DOCKER
    retention:
      keep_last: 5
      protect: ["latest-dev"]

  # ── Quay (JCR): stable releases ────────────────────────────────
  - id: quay-stable
    kind: registry
    build: fairer-pages
    url: cr.pcfae.com
    provider: quay
    path: "{var:org}/{var:repo}"
    tags:
      - "{version}"
      - "latest"
    when: { git_tags: [stable], events: [tag] }
    credentials: QUAY

  # ── Quay (JCR): dev builds ─────────────────────────────────────
  - id: quay-dev
    kind: registry
    build: fairer-pages
    url: cr.pcfae.com
    provider: quay
    path: "{var:org}/{var:repo}"
    tags:
      - "dev-{sha:8}"
      - "latest-dev"
    when: { branches: [main], events: [push] }
    credentials: QUAY
    retention:
      keep_last: 5
      protect: ["latest-dev"]

  # ── Docker Hub: README sync ─────────────────────────────────────
  - id: dockerhub-readme
    kind: docker-readme
    url: docker.io
    path: "{var:org}/{var:repo}"
    credentials: DOCKER
    when: { branches: [main], events: [push, tag] }
    file: "Readme.md"
    description: "Error pages as a service — 64 themes, playlists, hardened container"
    link_base: "https://github.com/{var:org}/{var:repo}/blob/main"

  # ── Primary release ─────────────────────────────────────────────
  - id: primary-release
    kind: release
    aliases: ["{version}", "latest"]
    when: { git_tags: [stable], events: [tag] }

narrator:
  - file: "Readme.md"
    link_base: "https://github.com/{var:org}/{var:repo}/blob/main"
    items:
      # ── Project section (repo health & sources) ─────────────────
      - id: project.github
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitHub-source-181717?logo=github"
        link: "https://github.com/{var:org}/{var:repo}"

      - id: project.gitlab
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "badge/GitLab-source-FC6D26?logo=gitlab"
        link: "https://gitlab.prplanit.com/precisionplanit/{var:repo}"

      - id: project.last-commit
        kind: props
        type: github-last-commit
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:org}/{var:repo}"

      - id: project.issues-open
        kind: props
        type: github-issues-open
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:org}/{var:repo}"

      - id: project.prs-open
        kind: shield
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        shield: "github/issues-pr/{var:org}/{var:repo}"

      - id: project.contributors
        kind: props
        type: github-contributors
        placement:
          between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
          mode: replace
          inline: true
        params:
          repo: "{var:org}/{var:repo}"

      # ── Status badges ───────────────────────────────────────────
      - id: badge.build
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: build
        value: "{env:BUILD_STATUS}"
        color: auto
        font: monofur
        output: ".stagefreight/badges/build.svg"
        link: "https://gitlab.prplanit.com/precisionplanit/{var:repo}/-/pipelines"

      - id: badge.license
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: license
        value: "AGPL-3.0-only"
        color: "#310937"
        font: monofur
        output: ".stagefreight/badges/license.svg"
        link: LICENSE

      - id: badge.release
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: release
        value: "v{base}"
        color: "#74ecbe"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/release.svg"
        link: "https://github.com/{var:org}/{var:repo}/releases"

      - id: badge.updated
        kind: badge
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        text: updated
        value: "{env:BUILD_DATE}"
        color: "#236144"
        font: dejavu-sans
        font_size: 11
        output: ".stagefreight/badges/updated.svg"

      - id: shield.donate
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/donate-FF5E5B?logo=ko-fi&logoColor=white"
        link: "https://ko-fi.com/T6T41IT163"

      - id: shield.sponsor
        kind: shield
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
        shield: "badge/sponsor-EA4AAA?logo=githubsponsors&logoColor=white"
        link: "https://github.com/sponsors/{var:org}"

      # ── Image section ───────────────────────────────────────────
      # Row 1: Docker image + pulls
      - id: image.docker
        kind: shield
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        shield: "badge/Docker-{var:org}%2Ffairer--pages-2496ED?logo=docker&logoColor=white"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.pulls
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: pulls
        value: "{docker.pulls}"
        color: "#1d63ed"
        output: ".stagefreight/badges/pulls.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}"

      - id: image.break1
        kind: break
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace

      # Row 2: All tag badges (release + dev)
      - id: image.release-latest
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: latest
        value: "v{base}"
        color: "#74ecbe"
        output: ".stagefreight/badges/latest.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest"

      - id: image.release-updated
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: updated
        value: "{docker.tag.v{base}.updated}"
        color: "#236144"
        output: ".stagefreight/badges/release-updated.svg"

      - id: image.release-size
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: size
        value: "{docker.tag.v{base}.size}"
        color: "#555"
        output: ".stagefreight/badges/release-size.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=v{base}"

      # Dev badges (same row)
      - id: image.dev-latest
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: latest-dev
        value: "dev-{sha:8}"
        color: "#3b82f6"
        output: ".stagefreight/badges/latest-dev.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

      - id: image.dev-updated
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: updated
        value: "{docker.tag.latest-dev.updated}"
        color: "#236144"
        output: ".stagefreight/badges/dev-updated.svg"

      - id: image.dev-size
        kind: badge
        placement:
          between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
          mode: replace
        text: size
        value: "{docker.tag.latest-dev.size}"
        color: "#555"
        output: ".stagefreight/badges/dev-size.svg"
        link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"

lint:
  level: full
  exclude:
    - "src/themes/*/resources/*.png"
    - "src/themes/*/resources/*.jpg"
    - "src/themes/*/resources/*.gif"
    - "src/themes/*/resources/*.svg"
    - "src/themes/*/resources/*.ico"
    - "src/themes/*/resources/*.webp"
    - "docs/screenshots/**/*.png"
    - "docs/screenshots/banner.png"

security:
  enabled: true
  sbom: true
  release_detail: full

commit:
  default_type: docs
  conventional: true
  backend: git
